name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.210.11.74
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd ~/fafa

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing backend deps..."
            cd AtomicBack
            npm install

            echo "📦 Installing frontend deps..."
            cd ../AtomicFront
            npm install

            echo "🏗️ Building frontend..."
            npm run build

            echo "🔄 Restarting apps with PM2..."
            pm2 restart atomicback || pm2 start npm --name atomicback -- run dev
            pm2 restart atomicfront || pm2 start serve --name atomicfront -- -s dist -l 5173

            pm2 save

            echo "✅ Deployment complete"